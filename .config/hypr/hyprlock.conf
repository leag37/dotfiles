source = $HOME/.config/hypr/themes/mocha.conf

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = JetbrainsMono Nerd Font

general {
  
}

background {
  monitor =
  #path = $HOME/.config/hypr/images/backgrounds/gray0_ctp_on_line.png
  blur_passes = 0
  color = $base
}

image {
  monitor =
  path = $HOME/.config/hypr/images/backgrounds/gray0_ctp_on_line.png
  border_size = 0
  position = 0, -15
  halign = center
  valign = center
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = center
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %B %d %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = center
  valign = top
}


# USER
label {
  monitor =
  text = $USER
  color = $text
  font_size = 25
  font_family = $font
  position = 0, 75
  halign = center
  valign = center
}

# PASSWORD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $accent
  inner_color = $surface0
  font_color = $text

  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -47

  fade_on_empty = false
  hide_input = false
  #placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
  placeholder_text = 󰌾 Password

  halign = center
  valign = center
}
